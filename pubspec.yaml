name: eantrack
description: EANTrack — Plataforma de rastreamento EAN para agências.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.6.1

  # Backend
  supabase_flutter: ^2.9.0

  # Auth
  google_sign_in: ^6.3.0
  sign_in_with_apple: ^7.0.1
  crypto: ^3.0.3

  # UI
  flutter_animate: ^4.5.0
  lottie: ^3.1.2
  google_fonts: ^6.3.3
  flutter_svg: ^2.1.0
  cached_network_image: ^3.4.1
  percent_indicator: ^4.2.2
  auto_size_text: ^3.0.0
  flutter_spinkit: ^5.2.0

  # Media
  image_picker: ^1.1.2
  photo_view: ^0.15.0
  barcode_widget: ^2.0.3
  pdf: ^3.10.8
  crop_your_image: ^0.7.5
  video_player: ^2.10.0

  # Forms
  mask_text_input_formatter: ^2.9.0
  easy_debounce: ^2.0.1

  # Storage
  shared_preferences: ^2.5.3
  path_provider: ^2.1.4

  # Utilities
  internet_connection_checker_plus: ^2.0.0
  intl: ^0.20.2
  url_launcher: ^6.3.1
  timeago: ^3.7.1
  collection: ^1.19.1
  equatable: ^2.0.7
  infinite_scroll_pagination: ^4.0.0

  # Permissions
  permission_handler: ^12.0.0+1

  # Firebase (analytics apenas)
  firebase_core: ^3.14.0
  firebase_performance: ^0.10.1+7

  # Icons
  font_awesome_flutter: ^10.7.0
  cupertino_icons: ^1.0.0

  # File
  file_picker: ^10.1.9

dependency_overrides:
  http: ^1.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: 'launcher_icon'
  ios: true
  web:
    generate: true
  image_path: 'assets/images/app_launcher_icon.png'
  adaptive_icon_background: '#00f1f4f8'
  adaptive_icon_foreground: 'assets/images/adaptive_foreground_icon.png'

flutter:
  uses-material-design: true

  assets:
    - assets/config/version.json
    - assets/fonts/
    - assets/images/
    - assets/videos/
    - assets/audios/
    - assets/rive_animations/
    - assets/animations/
    - assets/pdfs/
    - assets/jsons/

  fonts:
    - family: Icones
      fonts:
        - asset: assets/fonts/icones.ttf
    - family: IconesRH
      fonts:
        - asset: assets/fonts/iconesRH.ttf
    - family: MyFlutterApp
      fonts:
        - asset: assets/fonts/MyFlutterApp.ttf
